<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>بيانات العملاء</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<!-- مكتبة XLSX -->
<script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
<style>
    :root {
        --primary-color: #2c3e50;
        --primary-light: #3d566e;
        --accent-color: #27ae60;
        --accent-dark: #219150;
        --bg-color: #f4f7f6;
        --text-color: #333;
        --white: #ffffff;
        --danger: #c0392b;
    }

    * { box-sizing: border-box; }

    body {
        font-family: 'Tajawal', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 14px;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
    }

    header {
        text-align: center;
        margin-bottom: 18px;
        background: var(--primary-color);
        color: var(--white);
        padding: 16px 14px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    header h1 {
        margin: 0;
        font-size: clamp(18px, 4vw, 24px);
    }

    header .sub {
        margin-top: 4px;
        font-size: 13px;
        opacity: .8;
    }

    .upload-section {
        background: var(--white);
        padding: 18px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        margin-bottom: 16px;
        text-align: center;
    }

    .upload-section.has-data {
        padding: 12px 18px;
    }

    .drop-zone {
        border: 2.5px dashed #c7d3cf;
        border-radius: 10px;
        padding: 28px 14px;
        cursor: pointer;
        transition: border-color .2s, background-color .2s;
    }

    .drop-zone.dragover {
        border-color: var(--accent-color);
        background-color: #eafaf1;
    }

    .drop-zone-icon {
        font-size: 38px;
        margin-bottom: 8px;
        line-height: 1;
    }

    .drop-zone-text {
        font-weight: 700;
        color: var(--primary-color);
        font-size: 16px;
    }

    .drop-zone-sub {
        color: #888;
        font-size: 13px;
        margin-top: 4px;
    }

    #fileInput { display: none; }

    .auto-load-status {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 30px 14px;
    }

    .auto-load-status.hidden { display: none; }

    .spinner {
        width: 30px;
        height: 30px;
        border: 3px solid #e0e6e5;
        border-top-color: var(--accent-color);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .auto-load-text {
        color: var(--primary-color);
        font-weight: 500;
        font-size: 14px;
    }

    .btn-refresh {
        background: #eafaf1;
        color: var(--accent-dark);
    }

    .file-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
    }

    .file-bar-info {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        color: var(--primary-color);
        font-weight: 500;
        overflow: hidden;
    }

    .btn {
        border: none;
        border-radius: 6px;
        padding: 9px 16px;
        font-family: inherit;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        transition: background-color .2s;
        white-space: nowrap;
    }

    .btn-secondary { background: #ecf0f1; color: var(--primary-color); }
    .btn-danger { background: #fdecea; color: var(--danger); }

    .search-section {
        background: var(--white);
        padding: 16px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        margin-bottom: 16px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }

    input[type="text"] {
        flex: 1;
        min-width: 220px;
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 6px;
        font-size: 16px;
        font-family: inherit;
        outline: none;
        width: 100%;
    }

    .results-info { margin-bottom: 10px; font-weight: bold; color: var(--primary-color); font-size: 14px; }

    #suggestions {
        display: none;
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
        margin-top: -6px;
        margin-bottom: 16px;
        max-height: 260px;
        overflow-y: auto;
        box-shadow: 0 4px 10px rgba(0,0,0,0.12);
        position: relative;
        z-index: 5;
    }

    .suggestion-item { padding: 11px 14px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; }
    .suggestion-item:hover { background-color: #f0f0f0; }

    .table-container { overflow-x: auto; background: var(--white); border-radius: 10px; display: none; }
    table { width: 100%; border-collapse: collapse; min-width: 1100px; }
    th { background-color: var(--primary-color); color: var(--white); padding: 13px 12px; text-align: right; font-size: 13px; position: sticky; top: 0; }
    td { padding: 11px 12px; border-bottom: 1px solid #eee; font-size: 13px; }

    .customer-card { background: var(--white); border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); margin-bottom: 12px; overflow: hidden; }
    .card-head { background: var(--primary-light); color: var(--white); padding: 12px 14px; display: flex; justify-content: space-between; }
    .card-body { padding: 10px 14px; }
    .card-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #f1f1f1; font-size: 13.5px; }
    .map-link { display: inline-block; background-color: var(--accent-color); color: white; padding: 9px 14px; border-radius: 6px; text-decoration: none; text-align: center; width: 100%; font-weight: bold; }
    .map-link.unavailable { background-color: #ccc; color: #777; pointer-events: none; }

    .badge-city { background: #e1f5fe; color: #0288d1; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
    .status-msg { margin-top: 10px; font-size: 13px; border-radius: 6px; padding: 8px 12px; display: none; }
    .status-msg.error { display: block; background: #fdecea; color: var(--danger); }
    .hidden { display: none !important; }

    @media (min-width: 760px) { .table-container.has-data { display: block; } }
    @media (max-width: 759px) { .cards-container.has-data { display: block; } }
</style>
</head>
<body>

<div class="container">
    <header>
        <h1>بيانات العملاء</h1>
        <div class="sub">تحديث تلقائي للموقع من ملف إكسل</div>
    </header>

    <div class="upload-section" id="uploadSection">
        <div class="auto-load-status" id="autoLoadStatus">
            <div class="spinner"></div>
            <div class="auto-load-text">جاري تحميل ملف البيانات تلقائياً...</div>
        </div>
        <div class="drop-zone hidden" id="dropZone">
            <div class="drop-zone-icon">📂</div>
            <div class="drop-zone-text">اسحب ملف الإكسل هنا أو اضغط للرفع اليدوي</div>
        </div>
        <input type="file" id="fileInput" accept=".xlsx,.xls">
        <div class="status-msg" id="statusMsg"></div>
    </div>

    <div class="search-section hidden" id="searchSection">
        <input type="text" id="searchInput" placeholder="ابحث باسم العميل، الكود، أو المدينة..." oninput="handleSearch()">
    </div>

    <div id="suggestions"></div>
    <div id="resultsSummary" class="results-info"></div>

    <div class="table-container" id="tableContainer">
        <table>
            <thead><tr id="tableHeadRow"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="cards-container" id="cardsContainer"></div>
    <div id="noDataMessage" style="text-align:center; color:#888; padding:20px;">يرجى انتظار تحميل البيانات...</div>
</div>

<script>
const HEADER_ROW = 4;
const DATA_START_ROW = 5;
const GPS_COLUMN_INDEX = 22; 
const EXCLUDED_COLUMNS = [3, 5, 7, 8, 9, 10, 12, 13, 15, 17, 18, 19, 20, 23, 24, 25, 26, 27, 30, 32, 34, 35, 39];
const TARGET_FILENAME = 'Report_InventoryCustomerListing.xlsx';

let customers = [];
let visibleColumns = [];
let displayOrder = [];
let gpsColAbsoluteIndex = -1;

const autoLoadStatus = document.getElementById('autoLoadStatus');
const dropZone = document.getElementById('dropZone');
const uploadSection = document.getElementById('uploadSection');
const searchSection = document.getElementById('searchSection');
const searchInput = document.getElementById('searchInput');
const suggestionsDiv = document.getElementById('suggestions');
const resultsSummary = document.getElementById('resultsSummary');
const tableBody = document.getElementById('tableBody');
const tableHeadRow = document.getElementById('tableHeadRow');
const cardsContainer = document.getElementById('cardsContainer');
const noDataMessage = document.getElementById('noDataMessage');

// 1. التحميل التلقائي فور فتح الصفحة
async function tryAutoLoad() {
    try {
        const response = await fetch(TARGET_FILENAME, { cache: 'no-store' });
        if (!response.ok) throw new Error('File not found');

        const buffer = await response.arrayBuffer();
        const data = new Uint8Array(buffer);
        const workbook = XLSX.read(data, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '', raw: false });
        
        processRows(rows, TARGET_FILENAME, true);
    } catch (err) {
        console.error("Auto-load failed:", err);
        autoLoadStatus.classList.add('hidden');
        dropZone.classList.remove('hidden');
        noDataMessage.innerText = "فشل التحميل التلقائي. يرجى رفع الملف يدوياً.";
    }
}

// 2. معالجة البيانات
function processRows(rows, fileName, isAuto) {
    if (rows.length < HEADER_ROW) return;

    const headerRow = rows[HEADER_ROW - 1];
    const excludedSet = new Set(EXCLUDED_COLUMNS.map(n => n - 1));
    visibleColumns = [];
    gpsColAbsoluteIndex = -1;

    for (let c = 0; c < headerRow.length; c++) {
        if (!excludedSet.has(c)) {
            visibleColumns.push({ sourceIndex: c, header: (headerRow[c] || '').toString().trim() });
            if (c === GPS_COLUMN_INDEX - 1) gpsColAbsoluteIndex = visibleColumns.length - 1;
        }
    }

    computeDisplayOrder();

    customers = [];
    for (let r = DATA_START_ROW - 1; r < rows.length; r++) {
        if (!rows[r] || rows[r].length === 0) continue;
        const vals = visibleColumns.map(col => (rows[r][col.sourceIndex] || '').toString().trim());
        if (vals.some(v => v !== '')) customers.push(vals);
    }

    buildTableHead();
    showUI(fileName, isAuto);
    displayResults(customers);
}

function computeDisplayOrder() {
    const find = (keys) => visibleColumns.findIndex(c => keys.some(k => c.header.includes(k)));
    const codeIdx = find(['رمز', 'كود']);
    const nameIdx = find(['اسم العميل']);
    const phoneIdx = find(['تليفون', 'هاتف']);
    const areaIdx = find(['الحي']);

    const pinned = new Set([codeIdx, nameIdx, phoneIdx, areaIdx].filter(i => i >= 0));
    displayOrder = [];
    if (codeIdx >= 0) displayOrder.push({ type: 'col', colIndex: codeIdx });
    if (nameIdx >= 0) displayOrder.push({ type: 'col', colIndex: nameIdx });
    displayOrder.push({ type: 'map' });
    if (phoneIdx >= 0) displayOrder.push({ type: 'col', colIndex: phoneIdx });
    if (areaIdx >= 0) displayOrder.push({ type: 'col', colIndex: areaIdx });

    visibleColumns.forEach((_, i) => {
        if (i !== gpsColAbsoluteIndex && !pinned.has(i)) displayOrder.push({ type: 'col', colIndex: i });
    });
}

function buildTableHead() {
    tableHeadRow.innerHTML = '';
    displayOrder.forEach(e => {
        const th = document.createElement('th');
        th.textContent = e.type === 'map' ? 'الموقع' : visibleColumns[e.colIndex].header;
        tableHeadRow.appendChild(th);
    });
}

function showUI(name, isAuto) {
    uploadSection.classList.add('has-data');
    uploadSection.innerHTML = `
        <div class="file-bar">
            <div class="file-bar-info">
                <span>${isAuto ? '🔄' : '✅'}</span>
                <span>${name} (${customers.length} سجل)</span>
            </div>
            <button class="btn btn-secondary" onclick="location.reload()">تحديث/رفع جديد</button>
        </div>
    `;
    searchSection.classList.remove('hidden');
    document.getElementById('tableContainer').classList.add('has-data');
    cardsContainer.classList.add('has-data');
    noDataMessage.style.display = 'none';
}

function handleSearch() {
    const q = searchInput.value.trim().toLowerCase();
    if (q === "") { displayResults(customers); return; }

    const codeIdx = visibleColumns.findIndex(c => c.header.includes('كود') || c.header.includes('رمز'));
    const nameIdx = visibleColumns.findIndex(c => c.header.includes('اسم العميل'));

    const filtered = customers.filter(row => 
        (row[codeIdx] && row[codeIdx].toLowerCase().includes(q)) || 
        (row[nameIdx] && row[nameIdx].toLowerCase().includes(q))
    );
    
    displayResults(filtered);
}

function displayResults(data) {
    resultsSummary.innerText = `عدد النتائج: ${data.length}`;
    renderTable(data);
    renderCards(data);
}

function renderTable(data) {
    tableBody.innerHTML = '';
    data.forEach(row => {
        const tr = document.createElement('tr');
        displayOrder.forEach(e => {
            const td = document.createElement('td');
            if (e.type === 'map') {
                td.innerHTML = getMapLink(row[gpsColAbsoluteIndex]);
            } else {
                td.textContent = row[e.colIndex] || '-';
            }
            tr.appendChild(td);
        });
        tableBody.appendChild(tr);
    });
}

function renderCards(data) {
    cardsContainer.innerHTML = '';
    data.forEach(row => {
        const nameIdx = visibleColumns.findIndex(c => c.header.includes('اسم العميل'));
        const codeIdx = visibleColumns.findIndex(c => c.header.includes('كود') || c.header.includes('رمز'));
        
        const card = document.createElement('div');
        card.className = 'customer-card';
        let rowsHtml = '';
        displayOrder.forEach(e => {
            if (e.type !== 'map' && e.colIndex !== nameIdx && e.colIndex !== codeIdx) {
                rowsHtml += `<div class="card-row"><span class="label">${visibleColumns[e.colIndex].header}</span><span class="value">${row[e.colIndex] || '-'}</span></div>`;
            }
        });

        card.innerHTML = `
            <div class="card-head">
                <div class="name">${row[nameIdx]}</div>
                <div class="code">${row[codeIdx]}</div>
            </div>
            <div class="card-body">${rowsHtml}</div>
            <div class="card-foot">${getMapLink(row[gpsColAbsoluteIndex])}</div>
        `;
        cardsContainer.appendChild(card);
    });
}

function getMapLink(coords) {
    if (coords && coords.includes(',')) {
        return `<a href="https://www.google.com/maps/search/?api=1&query=${coords}" target="_blank" class="map-link">📍 فتح الخريطة</a>`;
    }
    return `<span class="map-link unavailable">غير متوفر</span>`;
}

// الرفع اليدوي كخيار بديل
dropZone.onclick = () => document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = (e) => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = (evt) => {
        const data = new Uint8Array(evt.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        processRows(XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1, defval: '', raw: false }), file.name, false);
    };
    reader.readAsArrayBuffer(file);
};

// تشغيل التحميل التلقائي
tryAutoLoad();
</script>
</body>
</html>
