<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>بيانات العملاء</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<!-- استخدام رابط مباشر وموثوق للمكتبة -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
    :root {
        --primary-color: #2c3e50;
        --primary-light: #3d566e;
        --accent-color: #27ae60;
        --accent-dark: #219150;
        --bg-color: #f4f7f6;
        --text-color: #333;
        --white: #ffffff;
        --danger: #c0392b;
    }

    * { box-sizing: border-box; }
    body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 14px; }
    .container { max-width: 1200px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 18px; background: var(--primary-color); color: var(--white); padding: 16px 14px; border-radius: 10px; }
    header h1 { margin: 0; font-size: clamp(18px, 4vw, 24px); }
    
    .upload-section { background: var(--white); padding: 18px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 16px; text-align: center; }
    .drop-zone { border: 2.5px dashed #c7d3cf; border-radius: 10px; padding: 28px 14px; cursor: pointer; }
    .auto-load-status { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 20px; }
    
    .spinner { width: 30px; height: 30px; border: 3px solid #e0e6e5; border-top-color: var(--accent-color); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .search-section { background: var(--white); padding: 16px; border-radius: 10px; margin-bottom: 16px; display: flex; gap: 10px; }
    input[type="text"] { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 6px; font-size: 16px; outline: none; width: 100%; }
    
    .table-container { overflow-x: auto; background: var(--white); border-radius: 10px; display: none; }
    table { width: 100%; border-collapse: collapse; min-width: 1000px; }
    th { background-color: var(--primary-color); color: var(--white); padding: 12px; text-align: right; }
    td { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }

    .customer-card { background: var(--white); border-radius: 12px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .card-head { background: var(--primary-light); color: var(--white); padding: 12px; display: flex; justify-content: space-between; }
    .card-body { padding: 12px; }
    .card-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #f9f9f9; }
    
    .map-link { display: block; background: var(--accent-color); color: white; padding: 10px; text-align: center; text-decoration: none; border-radius: 6px; font-weight: bold; margin-top: 10px; }
    .status-msg { margin-top: 10px; padding: 10px; border-radius: 6px; display: none; font-size: 14px; }
    .error { display: block; background: #fdecea; color: #c0392b; border: 1px solid #f9d7d3; }
    .hidden { display: none !important; }
    
    @media (min-width: 761px) { .table-container.has-data { display: block; } .cards-container { display: none; } }
    @media (max-width: 760px) { .cards-container.has-data { display: block; } .table-container { display: none !important; } }
</style>
</head>
<body>

<div class="container">
    <header>
        <h1>بيانات العملاء</h1>
        <div id="fileDate" style="font-size: 12px; opacity: 0.8;"></div>
    </header>

    <div class="upload-section" id="uploadArea">
        <div id="autoLoadStatus" class="auto-load-status">
            <div class="spinner"></div>
            <div id="loaderText">جاري جلب الملف من السيرفر...</div>
        </div>
        <div id="dropZone" class="drop-zone hidden">
            <div style="font-size:30px">📂</div>
            <b>فشل التحميل التلقائي</b><br>
            <span>اسحب الملف هنا أو اضغط للرفع اليدوي</span>
        </div>
        <input type="file" id="fileInput" class="hidden" accept=".xlsx,.xls">
        <div id="statusMsg" class="status-msg"></div>
    </div>

    <div id="searchArea" class="search-section hidden">
        <input type="text" id="searchInput" placeholder="ابحث باسم العميل أو الكود..." oninput="doSearch()">
    </div>

    <div id="resultsCount" style="margin-bottom:10px; font-weight:bold;"></div>

    <div class="table-container" id="tableContainer">
        <table>
            <thead><tr id="thRow"></tr></thead>
            <tbody id="tbBody"></tbody>
        </table>
    </div>

    <div class="cards-container" id="cardsContainer"></div>
</div>

<script>
const CONFIG = {
    fileName: 'Report_InventoryCustomerListing.xlsx', // تأكد أن الاسم يطابق المرفوع تماماً
    headerRow: 4,
    dataStartRow: 5,
    gpsColIdx: 21, // عمود V (0-based هو 21)
    excludedCols: [2, 4, 6, 7, 8, 9, 11, 12, 14, 16, 17, 18, 19, 22, 23, 24, 25, 26, 29, 31, 33, 34, 38] 
};

let rawData = [];
let columns = [];

// 1. وظيفة التحميل التلقائي
async function autoLoad() {
    const statusText = document.getElementById('loaderText');
    try {
        // محاولة جلب الملف
        const response = await fetch(CONFIG.fileName, { cache: 'no-store' });
        
        if (!response.ok) {
            throw new Error(`لم يتم العثور على الملف (خطأ ${response.status}). تأكد من رفع الملف بنفس الاسم تماماً.`);
        }

        const arrayBuffer = await response.arrayBuffer();
        parseExcel(arrayBuffer, CONFIG.fileName);
        
    } catch (err) {
        console.error(err);
        statusText.innerText = err.message;
        document.getElementById('autoLoadStatus').classList.add('hidden');
        document.getElementById('dropZone').classList.remove('hidden');
        showError(err.message);
    }
}

// 2. معالجة ملف الإكسل
function parseExcel(data, name) {
    const workbook = XLSX.read(data, { type: 'array' });
    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: "" });

    if (json.length < CONFIG.headerRow) {
        showError("الملف المرفوع لا يحتوي على بيانات كافية.");
        return;
    }

    // تحديد الأعمدة
    const headerRow = json[CONFIG.headerRow - 1];
    columns = [];
    headerRow.forEach((h, idx) => {
        if (!CONFIG.excludedCols.includes(idx)) {
            columns.push({ index: idx, name: h || `عمود ${idx+1}` });
        }
    });

    // تجهيز البيانات
    rawData = [];
    for (let i = CONFIG.dataStartRow - 1; i < json.length; i++) {
        if (json[i].length === 0 || !json[i][0]) continue;
        rawData.push(json[i]);
    }

    initUI(name);
    display(rawData);
}

// 3. تحديث الواجهة
function initUI(name) {
    document.getElementById('uploadArea').innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:10px;">
            <div style="text-align:right">
                <b style="color:var(--accent-dark)">✅ تم تحميل البيانات بنجاح</b><br>
                <small>${name} - ${rawData.length} عميل</small>
            </div>
            <button onclick="location.reload()" style="padding:8px; cursor:pointer; border-radius:5px; border:1px solid #ccc;">تحديث 🔄</button>
        </div>
    `;
    document.getElementById('searchArea').classList.remove('hidden');
    document.getElementById('tableContainer').classList.add('has-data');
    document.getElementById('cardsContainer').classList.add('has-data');
    
    // بناء رأس الجدول
    const thr = document.getElementById('thRow');
    thr.innerHTML = columns.map(c => `<th>${c.name}</th>`).join('') + `<th>الموقع</th>`;
}

// 4. البحث والعرض
function doSearch() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = rawData.filter(row => {
        return row.some(cell => String(cell).toLowerCase().includes(q));
    });
    display(filtered);
}

function display(data) {
    const tbody = document.getElementById('tbBody');
    const cContainer = document.getElementById('cardsContainer');
    document.getElementById('resultsCount').innerText = `عدد النتائج: ${data.length}`;

    // عرض الجدول
    tbody.innerHTML = data.map(row => {
        let cells = columns.map(col => `<td>${row[col.index] || "-"}</td>`).join('');
        cells += `<td>${getMapLink(row[CONFIG.gpsColIdx])}</td>`;
        return `<tr>${cells}</tr>`;
    }).join('');

    // عرض البطاقات (للموبايل)
    cContainer.innerHTML = data.map(row => `
        <div class="customer-card">
            <div class="card-head">
                <b>${row[1] || 'بدون اسم'}</b>
                <small>${row[0] || ''}</small>
            </div>
            <div class="card-body">
                ${columns.slice(2, 6).map(col => `
                    <div class="card-row">
                        <span>${col.name}:</span>
                        <span>${row[col.index] || '-'}</span>
                    </div>
                `).join('')}
                ${getMapLink(row[CONFIG.gpsColIdx], true)}
            </div>
        </div>
    `).join('');
}

function getMapLink(coords, isCard = false) {
    if (coords && String(coords).includes(',')) {
        return `<a href="https://www.google.com/maps/search/?api=1&query=${coords}" target="_blank" class="map-link">📍 فتح الخريطة</a>`;
    }
    return `<span style="color:#ccc; display:block; text-align:center; padding:10px;">📍 الموقع غير متوفر</span>`;
}

function showError(msg) {
    const el = document.getElementById('statusMsg');
    el.innerText = msg;
    el.className = 'status-msg error';
}

// تشغيل عند التحميل
window.onload = autoLoad;

// دعم الرفع اليدوي في حال فشل التلقائي
const dz = document.getElementById('dropZone');
const fi = document.getElementById('fileInput');
dz.onclick = () => fi.click();
fi.onchange = (e) => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = (evt) => parseExcel(evt.target.result, file.name);
    reader.readAsArrayBuffer(file);
};
</script>

</body>
</html>
